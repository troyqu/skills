# ─────────────────────────────────────────────────────────────
# User customization config for cross-agent-skill-sync.
# Copy this file to:
#   ~/.config/cross-agent-skill-sync/config.conf
# and uncomment/modify entries as needed.
#
# Values here override the bundled defaults in config.conf.
# Only include entries you want to change or add.
# ─────────────────────────────────────────────────────────────

# Add custom source directories.
# SOURCE_team_shared="$HOME/company/skills"

# Add or override agent directories.
# AGENT_custom_agent_USER="$HOME/.custom-agent/skills"
# AGENT_custom_agent_PROJECT=".custom-agent/skills"

# External sources automatically loaded by the agent.
# Use source keys, comma-separated.
# AGENT_some_tool_EXTERNAL_SOURCES="agents,team_shared"
