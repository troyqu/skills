# ─────────────────────────────────────────────────────────────
# Bundled default config for cross-agent-skill-sync.
# This file ships with the skill and is loaded automatically.
#
# DO NOT MODIFY this file. To customize, create your own at:
#   ~/.config/cross-agent-skill-sync/config.conf
# Your config is loaded after this one and can override any value.
# See references/config.example.conf for a customization template.
# ─────────────────────────────────────────────────────────────

# Default source directories.
SOURCE_cc_switch="$HOME/.cc-switch/skills"
SOURCE_agents="$HOME/.agents/skills"

# Default agent directories and external sources.
AGENT_claude_code_USER="$HOME/.claude/skills"
AGENT_claude_code_PROJECT=".claude/skills"
AGENT_codex_USER="$HOME/.codex/skills"
AGENT_codex_PROJECT=".codex/skills"
AGENT_gemini_USER="$HOME/.gemini/skills"
AGENT_gemini_PROJECT=".gemini/skills"
AGENT_gemini_EXTERNAL_SOURCES="agents"
AGENT_opencode_USER="$HOME/.opencode/skills"
AGENT_opencode_PROJECT=".opencode/skills"
AGENT_opencode_EXTERNAL_SOURCES="agents"
AGENT_openclaw_USER="$HOME/.openclaw/skills"
AGENT_openclaw_PROJECT=".openclaw/skills"
AGENT_cursor_USER="$HOME/.cursor/skills"
AGENT_cursor_PROJECT=".cursor/skills"
AGENT_copilot_USER="$HOME/.copilot/skills"
AGENT_copilot_PROJECT=".copilot/skills"
